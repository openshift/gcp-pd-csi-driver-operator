StorageClass:
  FromExistingClassName: ssd-csi
SnapshotClass:
  FromFile: images-volumesnapshotclass.yaml
DriverInfo:
  Name: pd.csi.storage.gke.io
  SupportedFsType:
    xfs: {}
    ext4: {}
  SupportedMountOption:
    debug:
    nouid32:
  SupportedSizeRange:
    Min: 1Gi
    Max: 64Ti
  TopologyKeys:
    - topology.gke.io/zone
  Capabilities:
    persistence: true
    fsGroup: true
    block: true
    exec: true
    # The driver does support volume limits, however, we disable
    # the capability to avoid creating 100+ volumes in a single test.
    volumeLimits: false
    controllerExpansion: true
    nodeExpansion: true
    snapshotDataSource: true
    pvcDataSource: true
    topology: true
    multipods: true
    multiplePVsSameID: true
  VolumeSnapshotStressTestOptions:
    NumPods: 2
    NumSnapshots: 5
# Image snapshots: longer readyToUse, restore bind, and delete vs default 5m.
Timeouts:
  ClaimProvision: 15m
  DataSourceProvision: 15m
  SnapshotCreate: 15m
  SnapshotDelete: 15m
